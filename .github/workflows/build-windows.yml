name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Compilar EXE
        run: pyinstaller --noconfirm --clean --windowed --name "Astrid Lopez PDF" --icon "assets/icons/icon.ico" --add-data "assets;assets" --add-data "ui;ui" main.py

      - name: Subir EXE
        uses: actions/upload-artifact@v4
        with:
          name: AstridLopezPDF-exe
          path: dist/**
